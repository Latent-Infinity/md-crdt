name: Publish to crates.io

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish (for example, v0.3.0)
        required: true
        type: string

permissions: {}

concurrency:
  group: crates-io-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Verify and publish md-crdt
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: crates-io
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Verify tag and crate version
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "release tag must be a Cargo version prefixed with v: $RELEASE_TAG" >&2
            exit 1
          fi
          if [[ "$(git cat-file -t "$RELEASE_TAG")" != "tag" ]]; then
            echo "release tag must be annotated: $RELEASE_TAG" >&2
            exit 1
          fi
          git tag --points-at HEAD | grep --fixed-strings --line-regexp "$RELEASE_TAG"
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "release tag must point to a commit on origin/main: $RELEASE_TAG" >&2
            exit 1
          fi
          crate_version="$(
            cargo metadata --no-deps --format-version 1 |
              jq --raw-output '.packages[] | select(.name == "md-crdt") | .version'
          )"
          if [[ "v$crate_version" != "$RELEASE_TAG" ]]; then
            echo "tag $RELEASE_TAG does not match md-crdt version $crate_version" >&2
            exit 1
          fi

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          rustup default stable

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: >-
          cargo clippy --workspace --all-targets --all-features --locked --
          -D warnings
          -W clippy::perf
          -W clippy::needless_collect
          -W clippy::map_flatten
          -W clippy::or_fun_call
          -W clippy::inefficient_to_string
          -W clippy::unnecessary_wraps
          -W clippy::useless_conversion

      - name: Test workspace
        run: cargo test --workspace --locked

      - name: Verify package
        run: cargo publish --dry-run --locked --package md-crdt

      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish md-crdt
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        run: cargo publish --locked --package md-crdt
